<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quranic Brain</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">

    <section id="home-screen">
      <h1>Quranic Brain</h1>
      <p class="subtitle">Train your Quran memory one ayah at a time</p>

      <div class="stats-card">
        <div>🔥 Streak: <span id="streak">0</span></div>
        <div>⭐ XP: <span id="xp">0</span></div>
      </div>

      <div class="goal-card">
        <h2>Today's Challenge</h2>
        <p>Complete 5 ayah questions</p>
        <button onclick="showJourney()">Continue Journey</button>
      </div>

      <div class="progress-card">
        <h2>Surah Progress</h2>
        <p>Al-Fatihah ★☆☆☆☆</p>
        <p>An-Nas ☆☆☆☆☆</p>
      </div>
    </section>

    <section id="lesson-screen" class="hidden">
      <p id="question-count">Question 1 / 5</p>

      <div class="verse-card">
        <div id="verse" class="arabic"></div>
      </div>

      <h2>Which ayah is this?</h2>

      <div id="choices" class="choices"></div>

      <p id="result"></p>
    </section>

    <section id="complete-screen" class="hidden">
      <h1>Lesson Complete 🎉</h1>
      <p id="score-summary"></p>
      <p>+ XP added to your progress</p>
      <button onclick="goHome()">Back Home</button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
